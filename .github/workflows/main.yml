name: CI - Build & Smoke Test Docker (Task 3)

on:
  push:
    branches: [ main ]
    paths:
      - 'task-3-expose-container/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'task-3-expose-container/**'

jobs:
  build-and-smoke-test:
    name: Build image and smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: curiousgaurav-exposed-app
      IMAGE_TAG: 1.0
      CONTEXT: ./task-3-expose-container
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU and buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ${{ env.CONTEXT }}
        run: |
          npm install

      - name: Run tests (if present)
        working-directory: ${{ env.CONTEXT }}
        run: |
          npm run test --if-present

      - name: Lint (if present)
        working-directory: ${{ env.CONTEXT }}
        run: |
          npm run lint --if-present

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          load: true

      - name: Smoke test - run container and check /health
        run: |
          docker run -d --name exposed-app-test -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG
          for i in {1..15}; do
            echo "Attempt $i: checking /health..."
            if curl -sSf http://localhost:8080/health; then
              echo ""
              echo "Smoke test passed"
              break
            fi
            sleep 2
          done

      - name: Collect logs and cleanup
        if: always()
        run: |
          docker logs exposed-app-test || true
          docker stop exposed-app-test || true
          docker rm exposed-app-test || true

