apiVersion: apps/v1
kind: Deployment
metadata:
  name: curiousgaurav-deployment
  namespace: default
  labels:
    app: web-server
    managed-by: kubernetes
    version: "1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: web-server
      tier: frontend
  template:
    metadata:
      labels:
        app: web-server
        tier: frontend
        version: "1.0"
    spec:
      restartPolicy: Always
      containers:
      - name: nginx-container
        image: nginx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        env:
        - name: APP_NAME
          value: "curiousgaurav-app"
        - name: ENVIRONMENT
          value: "development"
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: curiousgaurav-service
  labels:
    app: web-server
spec:
  type: NodePort
  selector:
    app: web-server
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
