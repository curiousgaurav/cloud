# ML Service (already in deployment.yaml, but shown separately for clarity)
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  labels:
    app: ml-service
    tier: backend
spec:
  type: NodePort
  selector:
    app: ml-service
    tier: backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30500
    name: http
